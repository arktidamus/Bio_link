<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Genesis 20</title>
    <style>
        body { margin: 0; background-color: #050505; color: white; font-family: monospace; overflow: hidden; }
        
        /* Заставка, которая требует нажатия (чтобы браузер разрешил звук) */
        #enter-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: black; z-index: 100;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            cursor: pointer;
        }
        #enter-screen h1 { color: #ff00ff; text-shadow: 0 0 10px #ff00ff; font-size: 2em; }
        #enter-screen p { color: #00ffff; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }

        /* Твой профиль (появляется после нажатия) */
        #profile { display: none; text-align: center; padding-top: 20%; }
        .avatar { width: 120px; height: 120px; border-radius: 50%; border: 2px solid #00ffff; box-shadow: 0 0 15px #00ffff; }
        .link-btn {
            display: block; width: 250px; margin: 15px auto; padding: 15px;
            background: #111; color: white; text-decoration: none;
            border: 1px solid #333; border-radius: 10px; text-transform: uppercase;
        }
        .link-btn:hover { border-color: #ff00ff; box-shadow: 0 0 10px #ff00ff; }
    </style>
</head>
<body>

    <audio id="music" loop>
        <source src="song.mp3" type="audio/mpeg">
    </audio>

    <div id="enter-screen" onclick="startSite()">
        <h1>[ GENESIS 20 ]</h1>
        <p>Нажми в любую точку экрана</p>
    </div>

    <div id="profile">
        <img src="https://via.placeholder.com/120" class="avatar" alt="Аватар">
        <h2>ТВОЙ НИК</h2>
        <p style="color: #888;">Парфюмерия | Reni | Genesis 20</p>
        
        <a href="#" class="link-btn">Telegram Канал</a>
        <a href="#" class="link-btn">Каталог Ароматов</a>
    </div>

    <script>
        function startSite() {
            // Включаем музыку
            document.getElementById('music').play();
            // Прячем черный экран
            document.getElementById('enter-screen').style.display = 'none';
            // Показываем профиль
            document.getElementById('profile').style.display = 'block';
        }
    </script>

</body>
</html>
